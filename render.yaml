services:
  - type: web
    name: p2p-kyc-gate
    runtime: node
    plan: starter # SQLite needs a persistent disk; free tier has no disks
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    disk:
      name: kyc-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/data.db
      - key: DIDIT_API_KEY
        sync: false # set in the Render dashboard, never committed
      - key: DIDIT_WORKFLOW_ID
        sync: false
      - key: DIDIT_WEBHOOK_SECRET
        sync: false
      - key: STATUS_KEY
        generateValue: true
      - key: BASE_URL
        sync: false # set to https://<this-service>.onrender.com after first deploy
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
